services:
  postgres:
    image: postgres:15-alpine
    container_name: lila_postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdbpassword
    ports:
      - "5432:5432"
    volumes:
      - nakama_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nakama"]
      interval: 5s
      timeout: 5s
      retries: 10

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.32.0
    container_name: lila_nakama
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/nakama/data
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdbpassword@postgres:5432/nakama &&
        exec /nakama/nakama
        --name lila-nakama
        --database.address postgres:localdbpassword@postgres:5432/nakama
        --socket.server_key supersecretlilakey
        --session.encryption_key day1sessionencryptionkey123
        --session.refresh_encryption_key day1refreshencryptionkey123
        --runtime.http_key day1runtimehttpkey123
        --runtime.js_entrypoint index.js
        --logger.level DEBUG
    ports:
      - "7350:7350"
      - "7351:7351"
      - "7349:7349"
    restart: unless-stopped

volumes:
  nakama_postgres_data:
